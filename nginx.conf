# ================================
# AI Feed Engine — Nginx Config
# BUG FIX: File ka naam nginc.cong tha → nginx.conf rename karo
# docker-compose.yml mein: ./nginx.conf:/etc/nginx/conf.d/default.conf
# ================================

upstream aifeed_app {
    server app:8080;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name _;

    # BUG FIX (local dev): Local mein SSL nahi hoga, to agar local use ho raha hai
    # to yeh block comment out karo aur neeche waala HTTP block uncomment karo.
    return 301 https://$host$request_uri;
}

