server {
    listen 443 ssl http2;
    server_name _;

    # SSL (apne certs se replace karo)
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512;

    # Security headers
    add_header X-Frame-Options           DENY;
    add_header X-Content-Type-Options    nosniff;
    add_header X-XSS-Protection          "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";

    # Upload limit
    client_max_body_size 250M;

    # BUG FIX: /css/ aur /js/ ki alias /var/www/uploads/ GALAT thi
    # CSS aur JS files Spring Boot static folder se serve hoti hain — uploads se nahi
    # Fix: Spring Boot app ko proxy karo — woh khud /static/ se serve karega
    location /css/ {
        proxy_pass http://aifeed_app;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /js/ {
        proxy_pass http://aifeed_app;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Video uploads — serve directly with streaming support
    location /uploads/ {
        alias /var/www/uploads/;
        expires 30d;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "public, immutable";
    }

    # WebSocket
    location /ws {
        proxy_pass http://aifeed_app;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host $host;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # Main app
    location / {
        proxy_pass         http://aifeed_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;
}