version: '3.9'

# ================================
# AI Feed Engine — Docker Compose
# Full stack: App + PostgreSQL + Redis + Kafka
# ================================

services:

  # ── Spring Boot App ──────────────────────────────
  app:
    build: .
    container_name: aifeed-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/aifeeddb
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-aifeed}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-changeme}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      UPLOAD_PATH: /app/uploads/
      PUSH_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      PUSH_VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      SPRING_PROFILES_ACTIVE: prod
      # FIX: JWT_SECRET env var add kiya — pehle hardcoded tha application.yml me
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aifeed-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── PostgreSQL ───────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aifeed-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: aifeeddb
      POSTGRES_USER: ${DB_USER:-aifeed}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aifeed-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aifeed} -d aifeeddb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aifeed-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD must be set}"]
    volumes:
      - redis_data:/data
    networks:
      - aifeed-net
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$${REDIS_PASSWORD}\" redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka + Zookeeper ────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: aifeed-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - aifeed-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: aifeed-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    depends_on:
      - zookeeper
    networks:
      - aifeed-net

  # ── Nginx Reverse Proxy ──────────────────────────
  nginx:
    image: nginx:alpine
    container_name: aifeed-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # FIX: nginx.conf sahi naam hai — pehle nginc.cong tha jo mount fail karta
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads_data:/var/www/uploads:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - aifeed-net

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  aifeed-net:
    driver: bridge
