<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>404 | AI Feed</title>
	<style>
		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body {
			background: #0a0a14;
			color: #fff;
			font-family: 'Segoe UI', sans-serif;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			text-align: center;
			padding: 20px;
		}

		.wrap {
			max-width: 480px;
		}

		.emoji {
			font-size: 5rem;
			margin-bottom: 20px;
			animation: float 3s ease-in-out infinite;
		}

		@keyframes float {

			0%,
			100% {
				transform: translateY(0)
			}

			50% {
				transform: translateY(-16px)
			}
		}

		h1 {
			font-size: 6rem;
			font-weight: 900;
			background: linear-gradient(135deg, #4f46e5, #a78bfa);
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
			line-height: 1;
		}

		h2 {
			font-size: 1.4rem;
			color: #aaa;
			margin: 12px 0 8px;
		}

		p {
			color: #555;
			font-size: 0.9rem;
			margin-bottom: 32px;
			line-height: 1.6;
		}

		.btn {
			display: inline-block;
			background: linear-gradient(135deg, #4f46e5, #7c3aed);
			color: #fff;
			padding: 12px 28px;
			border-radius: 12px;
			text-decoration: none;
			font-weight: 700;
			font-size: 0.9rem;
			transition: opacity 0.2s;
			margin: 6px;
		}

		.btn:hover {
			opacity: 0.85;
		}

		.btn-outline {
			background: transparent;
			border: 1.5px solid #333;
			color: #888;
		}

		.btn-outline:hover {
			border-color: #4f46e5;
			color: #fff;
		}
	</style>
</head>

<body>
	<div class="wrap">
		<div class="emoji">🎬</div>
		<h1>404</h1>
		<h2>Yeh page kho gaya!</h2>
		<p>Aap jo page dhundh rahe the, woh yahan nahi hai.<br>Shayad URL galat hai ya page delete ho gaya.</p>
		<a href="/feed" class="btn">🏠 Feed pe jao</a>
		<a href="javascript:history.back()" class="btn btn-outline">← Wapas jao</a>
	</div>
</body>

</html>
