<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Live Streams | AI Feed</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" th:href="@{/css/main.css}">
	<style>
		* {
			box-sizing: border-box
		}

		.live-browse {
			max-width: 1000px;
			margin: 0 auto;
			padding: 80px 20px 100px
		}

		.browse-header {
			display: flex;
			align-items: center;
			justify-content: space-between;
			margin-bottom: 24px;
			flex-wrap: wrap;
			gap: 12px
		}

		.browse-header h1 {
			font-size: 1.5rem;
			font-weight: 800;
			display: flex;
			align-items: center;
			gap: 10px
		}

		.live-dot {
			width: 10px;
			height: 10px;
			background: #f43f5e;
			border-radius: 50%;
			animation: pulseDot 1.5s infinite;
			display: inline-block
		}

		@keyframes pulseDot {

			0%,
			100% {
				opacity: 1;
				transform: scale(1)
			}

			50% {
				opacity: .6;
				transform: scale(1.3)
			}
		}

		.go-live-link {
			background: linear-gradient(135deg, #f43f5e, #ec4899);
			color: #fff;
			padding: 10px 22px;
			border-radius: 24px;
			text-decoration: none;
			font-size: .85rem;
			font-weight: 700;
			transition: opacity .2s;
			box-shadow: 0 4px 15px rgba(244, 63, 94, .3)
		}

		.go-live-link:hover {
			opacity: .88
		}

		.streams-grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
			gap: 16px
		}

		.stream-card {
			background: #0d0d1a;
			border: 1px solid rgba(255, 255, 255, .07);
			border-radius: 16px;
			overflow: hidden;
			cursor: pointer;
			transition: all .2s;
			text-decoration: none;
			color: inherit;
			display: block
		}

		.stream-card:hover {
			border-color: rgba(99, 102, 241, .4);
			transform: translateY(-3px);
			box-shadow: 0 8px 30px rgba(0, 0, 0, .4)
		}

		.stream-thumb {
			aspect-ratio: 16/9;
			background: linear-gradient(135deg, #0f0f2e, #1e1040, #2d1b69);
			position: relative;
			overflow: hidden;
			display: flex;
			align-items: center;
			justify-content: center
		}

		.stream-thumb .thumb-icon {
			font-size: 3rem;
			opacity: .3
		}

		.stream-live-badge {
			position: absolute;
			top: 10px;
			left: 10px;
			background: #f43f5e;
			color: #fff;
			padding: 3px 10px;
			border-radius: 20px;
			font-size: .7rem;
			font-weight: 800;
			letter-spacing: .5px
		}

		.stream-viewers {
			position: absolute;
			bottom: 10px;
			right: 10px;
			background: rgba(0, 0, 0, .6);
			backdrop-filter: blur(4px);
			color: #fff;
			padding: 3px 10px;
			border-radius: 20px;
			font-size: .75rem;
			font-weight: 600
		}

		.stream-card-body {
			padding: 14px
		}

		.stream-card-title {
			font-size: .92rem;
			font-weight: 700;
			color: #f1f1f8;
			margin-bottom: 8px;
			line-height: 1.3;
			display: -webkit-box;
			-webkit-line-clamp: 2;
			-webkit-box-orient: vertical;
			overflow: hidden
		}

		.stream-host-row {
			display: flex;
			align-items: center;
			gap: 8px
		}

		.stream-host-av {
			width: 28px;
			height: 28px;
			border-radius: 50%;
			object-fit: cover;
			background: #1a1a2e;
			flex-shrink: 0
		}

		.stream-host-name {
			font-size: .8rem;
			color: #9ca3af;
			font-weight: 500
		}

		.empty-state {
			text-align: center;
			padding: 80px 20px;
			color: #374151;
			grid-column: 1/-1
		}

		.empty-state .icon {
			font-size: 4rem;
			margin-bottom: 16px
		}

		.empty-state h3 {
			font-size: 1.1rem;
			color: #6b7280;
			margin-bottom: 8px
		}

		.empty-state p {
			font-size: .85rem
		}

		.empty-state a {
			display: inline-block;
			margin-top: 16px;
			background: #6366f1;
			color: #fff;
			padding: 10px 24px;
			border-radius: 24px;
			text-decoration: none;
			font-weight: 700;
			font-size: .88rem
		}
	</style>
</head>

<body>
	<div th:replace="~{components/header :: header}"></div>

	<div class="live-browse">
		<div class="browse-header">
			<h1><span class="live-dot"></span> Live Streams</h1>
			<a href="/live/start" class="go-live-link">🔴 Go Live</a>
		</div>

		<div class="streams-grid" id="streamsGrid">
			<div style="color:#6b7280;padding:20px;grid-column:1/-1;text-align:center">
				Loading streams...
			</div>
		</div>
	</div>

	<script>
		async function loadStreams() {
			const grid = document.getElementById('streamsGrid')
			try {
				const res = await fetch('/api/live/active')
				const streams = await res.json()
				grid.innerHTML = ''

				if (!streams?.length) {
					grid.innerHTML = `
        <div class="empty-state">
          <div class="icon">📺</div>
          <h3>Abhi koi live nahi hai</h3>
          <p>Pehle live jaao!</p>
          <a href="/live/start">🔴 Go Live</a>
        </div>`
					return
				}

				streams.forEach(s => {
					const card = document.createElement('a')
					card.href = '/live/watch/' + s.streamKey
					card.className = 'stream-card'
					card.innerHTML = `
        <div class="stream-thumb">
          <div class="thumb-icon">🎬</div>
          <div class="stream-live-badge">● LIVE</div>
          <div class="stream-viewers">👁 ${s.viewerCount}</div>
        </div>
        <div class="stream-card-body">
          <div class="stream-card-title">${s.title}</div>
          <div class="stream-host-row">
            <img class="stream-host-av" src="${s.hostAvatar || ''}"
                 onerror="this.style.display='none'" alt="">
            <span class="stream-host-name">${s.hostName}</span>
          </div>
        </div>`
					grid.appendChild(card)
				})
			} catch (e) {
				grid.innerHTML = '<div style="color:#f43f5e;padding:20px;text-align:center">Streams load fail</div>'
			}
		}

		loadStreams()
		setInterval(loadStreams, 15000) // 15 sec pe refresh
	</script>
</body>

</html>
