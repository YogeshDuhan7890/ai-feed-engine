<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Live Stream | AI Feed</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta th:name="_csrf" th:content="${_csrf.token}" />
	<meta th:name="_csrf_header" th:content="${_csrf.headerName}" />
	<link rel="stylesheet" th:href="@{/css/main.css}">
	<style>
		* {
			box-sizing: border-box
		}

		body {
			background: #000;
			color: #f1f1f8;
			font-family: 'Segoe UI', sans-serif;
			margin: 0;
			min-height: 100vh;
			overflow-x: hidden
		}

		.watch-layout {
			display: flex;
			height: calc(100vh - 60px);
			padding-top: 60px
		}

		/* ── Video area ── */
		.video-area {
			flex: 1;
			position: relative;
			background: #000;
			display: flex;
			align-items: center;
			justify-content: center;
			min-width: 0
		}

		#remoteVideo {
			width: 100%;
			height: 100%;
			object-fit: contain;
			display: block
		}

		.stream-overlay {
			position: absolute;
			inset: 0;
			pointer-events: none;
			background: linear-gradient(to top, rgba(0, 0, 0, .75) 0%, transparent 45%, rgba(0, 0, 0, .3) 100%)
		}

		/* ── Stream info bar ── */
		.stream-info {
			position: absolute;
			bottom: 80px;
			left: 16px;
			z-index: 10;
			max-width: 60%
		}

		.stream-title {
			font-size: 1.05rem;
			font-weight: 700;
			margin-bottom: 6px;
			text-shadow: 0 1px 6px rgba(0, 0, 0, .9)
		}

		.host-row {
			display: flex;
			align-items: center;
			gap: 10px
		}

		.host-av {
			width: 34px;
			height: 34px;
			border-radius: 50%;
			object-fit: cover;
			border: 2px solid rgba(255, 255, 255, .5)
		}

		.host-name {
			font-size: .85rem;
			font-weight: 600;
			text-shadow: 0 1px 4px rgba(0, 0, 0, .8)
		}

		.live-badge {
			background: #f43f5e;
			color: #fff;
			padding: 3px 10px;
			border-radius: 20px;
			font-size: .68rem;
			font-weight: 800;
			letter-spacing: .5px;
			animation: pulseLive 1.5s infinite
		}

		@keyframes pulseLive {

			0%,
			100% {
				opacity: 1
			}

			50% {
				opacity: .6
			}
		}

		/* ── Top badges ── */
		.top-badges {
			position: absolute;
			top: 14px;
			left: 14px;
			right: 14px;
			display: flex;
			justify-content: space-between;
			align-items: center;
			z-index: 10
		}

		.viewer-badge {
			background: rgba(0, 0, 0, .55);
			backdrop-filter: blur(4px);
			color: #fff;
			padding: 4px 12px;
			border-radius: 20px;
			font-size: .78rem;
			font-weight: 600
		}

		.quality-badge {
			background: rgba(0, 0, 0, .55);
			backdrop-filter: blur(4px);
			color: #10b981;
			padding: 4px 10px;
			border-radius: 20px;
			font-size: .7rem;
			font-weight: 700
		}

		/* ── Reaction bar ── */
		.reaction-bar {
			position: absolute;
			bottom: 16px;
			left: 16px;
			display: flex;
			gap: 8px;
			z-index: 10
		}

		.react-btn {
			background: rgba(0, 0, 0, .55);
			backdrop-filter: blur(4px);
			border: 1px solid rgba(255, 255, 255, .15);
			color: #fff;
			width: 40px;
			height: 40px;
			border-radius: 50%;
			font-size: 1.1rem;
			cursor: pointer;
			display: flex;
			align-items: center;
			justify-content: center;
			transition: transform .15s;
			border: none
		}

		.react-btn:hover {
			transform: scale(1.2)
		}

		.react-btn:active {
			transform: scale(.9)
		}

		/* ── Gift button ── */
		.gift-bar {
			position: absolute;
			bottom: 16px;
			right: 310px;
			z-index: 10
		}

		.gift-btn {
			background: linear-gradient(135deg, #f59e0b, #f43f5e);
			border: none;
			color: #fff;
			padding: 8px 16px;
			border-radius: 20px;
			font-size: .82rem;
			font-weight: 700;
			cursor: pointer;
			box-shadow: 0 4px 15px rgba(244, 63, 94, .3);
			transition: all .2s
		}

		.gift-btn:hover {
			transform: translateY(-2px);
			opacity: .9
		}

		/* ── Floating reactions ── */
		.float-container {
			position: absolute;
			bottom: 70px;
			left: 16px;
			width: 60px;
			height: 200px;
			pointer-events: none;
			overflow: hidden
		}

		.float-emoji {
			position: absolute;
			bottom: 0;
			font-size: 1.5rem;
			animation: floatUp 3s ease-out forwards
		}

		@keyframes floatUp {
			0% {
				opacity: 1;
				transform: translateY(0) scale(1)
			}

			100% {
				opacity: 0;
				transform: translateY(-200px) scale(1.5)
			}
		}

		/* ── Overlays ── */
		.ended-overlay {
			position: absolute;
			inset: 0;
			background: rgba(0, 0, 0, .85);
			display: none;
			align-items: center;
			justify-content: center;
			flex-direction: column;
			gap: 14px;
			z-index: 20
		}

		.ended-overlay .icon {
			font-size: 4rem
		}

		.ended-overlay h2 {
			font-size: 1.3rem;
			font-weight: 700
		}

		.ended-overlay p {
			color: #6b7280;
			font-size: .88rem
		}

		.ended-overlay a {
			background: #6366f1;
			color: #fff;
			padding: 10px 24px;
			border-radius: 24px;
			text-decoration: none;
			font-weight: 700;
			font-size: .88rem
		}

		.loading-overlay {
			position: absolute;
			inset: 0;
			background: #000;
			display: flex;
			align-items: center;
			justify-content: center;
			flex-direction: column;
			gap: 14px;
			z-index: 15
		}

		.spinner {
			width: 44px;
			height: 44px;
			border: 3px solid #1a1a2e;
			border-top-color: #6366f1;
			border-radius: 50%;
			animation: spin .8s linear infinite
		}

		@keyframes spin {
			to {
				transform: rotate(360deg)
			}
		}

		/* ── Gift modal ── */
		#giftModal {
			position: fixed;
			inset: 0;
			background: rgba(0, 0, 0, .8);
			backdrop-filter: blur(6px);
			z-index: 100;
			display: none;
			align-items: flex-end;
			justify-content: center;
			padding-bottom: 20px
		}

		#giftModal.open {
			display: flex
		}

		.gift-modal-box {
			background: #0d0d1a;
			border: 1px solid rgba(255, 255, 255, .1);
			border-radius: 20px 20px 0 0;
			padding: 20px;
			width: min(400px, 100%)
		}

		.gift-grid {
			display: grid;
			grid-template-columns: repeat(4, 1fr);
			gap: 10px;
			margin: 14px 0
		}

		.gift-item {
			background: rgba(255, 255, 255, .05);
			border: 1px solid rgba(255, 255, 255, .08);
			border-radius: 14px;
			padding: 12px 6px;
			text-align: center;
			cursor: pointer;
			transition: all .2s
		}

		.gift-item:hover {
			border-color: rgba(245, 158, 11, .5);
			background: rgba(245, 158, 11, .08);
			transform: scale(1.05)
		}

		.gift-item .gift-icon {
			font-size: 1.8rem;
			margin-bottom: 4px
		}

		.gift-item .gift-name {
			font-size: .65rem;
			color: #9ca3af
		}

		.gift-item .gift-price {
			font-size: .72rem;
			color: #f59e0b;
			font-weight: 700
		}

		/* ── Chat sidebar ── */
		.chat-sidebar {
			width: 300px;
			flex-shrink: 0;
			background: #0d0d1a;
			border-left: 1px solid rgba(255, 255, 255, .07);
			display: flex;
			flex-direction: column
		}

		.chat-header {
			padding: 14px 16px;
			border-bottom: 1px solid rgba(255, 255, 255, .07);
			font-weight: 700;
			font-size: .92rem;
			display: flex;
			align-items: center;
			justify-content: space-between
		}

		.chat-tabs {
			display: flex;
			gap: 0;
			padding: 0 12px;
			border-bottom: 1px solid rgba(255, 255, 255, .06)
		}

		.chat-tab {
			background: none;
			border: none;
			border-bottom: 2px solid transparent;
			color: #6b7280;
			padding: 7px 12px;
			cursor: pointer;
			font-size: .78rem;
			font-weight: 600;
			font-family: inherit;
			transition: all .15s
		}

		.chat-tab.active {
			color: #f1f1f8;
			border-bottom-color: #6366f1
		}

		.chat-msgs {
			flex: 1;
			overflow-y: auto;
			padding: 12px;
			display: flex;
			flex-direction: column;
			gap: 6px
		}

		.chat-msgs::-webkit-scrollbar {
			width: 3px
		}

		.chat-msgs::-webkit-scrollbar-thumb {
			background: #2a2a3e;
			border-radius: 2px
		}

		.chat-msg {
			font-size: .8rem;
			line-height: 1.4;
			display: flex;
			gap: 6px;
			align-items: baseline
		}

		.chat-msg .sender {
			font-weight: 700;
			color: #818cf8;
			flex-shrink: 0
		}

		.chat-msg .text {
			color: #d1d5db;
			word-break: break-word
		}

		.chat-msg.gift-msg .text {
			color: #f59e0b;
			font-weight: 600
		}

		.chat-msg.react-msg .text {
			font-size: 1.1rem
		}

		.chat-system {
			font-size: .72rem;
			color: #4b5563;
			text-align: center;
			padding: 3px 0
		}

		.chat-input-row {
			padding: 10px;
			border-top: 1px solid rgba(255, 255, 255, .07);
			display: flex;
			gap: 6px;
			align-items: center
		}

		.emoji-btns {
			display: flex;
			gap: 4px
		}

		.emoji-quick {
			background: none;
			border: none;
			font-size: .9rem;
			cursor: pointer;
			padding: 2px;
			transition: transform .15s
		}

		.emoji-quick:hover {
			transform: scale(1.3)
		}

		.chat-input-row input {
			flex: 1;
			background: rgba(255, 255, 255, .06);
			border: 1px solid rgba(255, 255, 255, .1);
			border-radius: 20px;
			padding: 7px 12px;
			color: #f1f1f8;
			font-size: .8rem;
			outline: none
		}

		.chat-input-row input:focus {
			border-color: #6366f1
		}

		.chat-send-btn {
			background: #6366f1;
			border: none;
			color: #fff;
			padding: 7px 12px;
			border-radius: 20px;
			cursor: pointer;
			font-size: .8rem;
			font-weight: 600
		}

		/* ── Gift notification ── */
		.gift-notif {
			position: absolute;
			top: 70px;
			left: 50%;
			transform: translateX(-50%);
			background: linear-gradient(135deg, rgba(245, 158, 11, .9), rgba(244, 63, 94, .9));
			backdrop-filter: blur(8px);
			color: #fff;
			padding: 10px 20px;
			border-radius: 24px;
			font-size: .88rem;
			font-weight: 700;
			z-index: 15;
			display: none;
			animation: giftPop .4s ease;
			box-shadow: 0 8px 24px rgba(245, 158, 11, .4)
		}

		@keyframes giftPop {
			from {
				opacity: 0;
				transform: translateX(-50%) scale(.8)
			}

			to {
				opacity: 1;
				transform: translateX(-50%) scale(1)
			}
		}

		@media(max-width:768px) {
			.watch-layout {
				flex-direction: column
			}

			.chat-sidebar {
				width: 100%;
				height: 240px;
				border-left: none;
				border-top: 1px solid rgba(255, 255, 255, .07)
			}

			.gift-bar {
				right: 16px;
				bottom: 60px
			}
		}
	</style>
</head>

<body>
	<div th:replace="~{components/header :: header}"></div>

	<div class="watch-layout">

		<!-- Video area -->
		<div class="video-area">
			<video id="remoteVideo" autoplay playsinline></video>
			<div class="stream-overlay"></div>

			<!-- Top -->
			<div class="top-badges">
				<div class="viewer-badge" id="viewerBadge">👁 0</div>
				<div class="quality-badge" id="qualityBadge">HD</div>
			</div>

			<!-- Loading -->
			<div class="loading-overlay" id="loadingOverlay">
				<div class="spinner"></div>
				<div style="color:#9ca3af;font-size:.88rem">Stream se connect ho raha hai...</div>
			</div>

			<!-- Stream info -->
			<div class="stream-info">
				<div class="stream-title" id="streamTitle">Loading...</div>
				<div class="host-row">
					<img class="host-av" id="hostAvatar" src="" alt="" onerror="this.style.display='none'">
					<span class="host-name" id="hostName"></span>
					<span class="live-badge">● LIVE</span>
				</div>
			</div>

			<!-- Reaction bar -->
			<div class="reaction-bar">
				<button class="react-btn" onclick="sendReaction('❤️')" title="Heart">❤️</button>
				<button class="react-btn" onclick="sendReaction('🔥')" title="Fire">🔥</button>
				<button class="react-btn" onclick="sendReaction('😂')" title="LOL">😂</button>
				<button class="react-btn" onclick="sendReaction('👏')" title="Clap">👏</button>
				<button class="react-btn" onclick="sendReaction('😮')" title="Wow">😮</button>
			</div>

			<!-- Gift button -->
			<div class="gift-bar">
				<button class="gift-btn" onclick="openGiftModal()">🎁 Gift</button>
			</div>

			<!-- Floating reactions container -->
			<div class="float-container" id="floatContainer"></div>

			<!-- Gift notification -->
			<div class="gift-notif" id="giftNotif"></div>

			<!-- Ended overlay -->
			<div class="ended-overlay" id="endedOverlay">
				<div class="icon">📺</div>
				<h2>Stream Khatam Ho Gayi</h2>
				<p>Host ne stream band kar di</p>
				<a href="/live">Aur streams dekho →</a>
			</div>
		</div>

		<!-- Chat sidebar -->
		<div class="chat-sidebar">
			<div class="chat-header">
				💬 Live Chat
				<span style="font-size:.72rem;color:#6b7280;font-weight:400" id="onlineCount">0 online</span>
			</div>
			<div class="chat-tabs">
				<button class="chat-tab active" onclick="switchTab('chat', this)">Chat</button>
				<button class="chat-tab" onclick="switchTab('gifts', this)">🎁 Gifts</button>
			</div>
			<div class="chat-msgs" id="chatMsgs">
				<div class="chat-system">Chat mein shaamil ho!</div>
			</div>
			<div class="chat-input-row">
				<div class="emoji-btns">
					<button class="emoji-quick" onclick="appendEmoji('❤️')">❤️</button>
					<button class="emoji-quick" onclick="appendEmoji('😂')">😂</button>
					<button class="emoji-quick" onclick="appendEmoji('🔥')">🔥</button>
				</div>
				<input type="text" id="chatInput" placeholder="Message..." maxlength="200">
				<button class="chat-send-btn" onclick="sendChat()">➤</button>
			</div>
		</div>
	</div>

	<!-- Gift Modal -->
	<div id="giftModal">
		<div class="gift-modal-box">
			<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
				<div style="font-weight:700;font-size:.95rem">🎁 Gift Bhejo</div>
				<button onclick="closeGiftModal()"
					style="background:none;border:none;color:#9ca3af;cursor:pointer;font-size:1.1rem">✕</button>
			</div>
			<div style="font-size:.75rem;color:#6b7280;margin-bottom:2px">Host ko appreciate karo!</div>
			<div class="gift-grid" id="giftGrid">
				<!-- Filled by JS -->
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/sockjs-client/dist/sockjs.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>
	<script th:inline="javascript">
		const STREAM_KEY = /*[[${streamKey}]]*/ ''
		const viewerId = 'v_' + Math.random().toString(36).substr(2, 8)
		let stompClient = null
		let peerConnection = null
		let myName = 'Viewer'
		let activeTab = 'chat'

		const STUN_SERVERS = {
			iceServers: [
				{urls: 'stun:stun.l.google.com:19302'},
				{urls: 'stun:stun1.l.google.com:19302'}
			]
		}

		const GIFTS = [
			{id: 'rose', icon: '🌹', name: 'Rose', price: 5},
			{id: 'heart', icon: '💝', name: 'Heart', price: 10},
			{id: 'star', icon: '⭐', name: 'Star', price: 20},
			{id: 'fire', icon: '🔥', name: 'Fire', price: 25},
			{id: 'diamond', icon: '💎', name: 'Diamond', price: 50},
			{id: 'crown', icon: '👑', name: 'Crown', price: 100},
			{id: 'rocket', icon: '🚀', name: 'Rocket', price: 150},
			{id: 'trophy', icon: '🏆', name: 'Trophy', price: 200}
		]

		// ─── Init gift grid ───────────────────────────────────────────────────────────
		function initGiftGrid() {
			const grid = document.getElementById('giftGrid')
			grid.innerHTML = GIFTS.map(g =>
				'<div class="gift-item" onclick="sendGift(\'' + g.id + '\',\'' + g.icon + '\',\'' + g.name + '\',' + g.price + ')">' +
				'<div class="gift-icon">' + g.icon + '</div>' +
				'<div class="gift-name">' + g.name + '</div>' +
				'<div class="gift-price">₹' + g.price + '</div>' +
				'</div>'
			).join('')
		}

		// ─── Gift modal ───────────────────────────────────────────────────────────────
		function openGiftModal() {document.getElementById('giftModal').classList.add('open')}
		function closeGiftModal() {document.getElementById('giftModal').classList.remove('open')}
		document.getElementById('giftModal').addEventListener('click', function (e) {
			if (e.target === this) closeGiftModal()
		})

		function sendGift(id, icon, name, price) {
			closeGiftModal()
			if (!stompClient) return
			stompClient.send('/app/live.chat', {}, JSON.stringify({
				streamKey: STREAM_KEY,
				senderName: myName,
				message: 'ne ' + icon + ' ' + name + ' gift kiya! (₹' + price + ')',
				type: 'GIFT',
				giftIcon: icon
			}))
			spawnFloat(icon + icon)
		}

		// ─── Reactions ────────────────────────────────────────────────────────────────
		function sendReaction(emoji) {
			spawnFloat(emoji)
			if (!stompClient) return
			stompClient.send('/app/live.chat', {}, JSON.stringify({
				streamKey: STREAM_KEY,
				senderName: myName,
				message: emoji,
				type: 'REACTION'
			}))
		}

		function spawnFloat(emoji) {
			const container = document.getElementById('floatContainer')
			const el = document.createElement('div')
			el.className = 'float-emoji'
			el.textContent = emoji
			el.style.left = Math.random() * 30 + 'px'
			container.appendChild(el)
			setTimeout(() => el.remove(), 3100)
		}

		// ─── Chat tab switch ──────────────────────────────────────────────────────────
		function switchTab(tab, btn) {
			activeTab = tab
			document.querySelectorAll('.chat-tab').forEach(b => b.classList.remove('active'))
			btn.classList.add('active')
			// Filter messages
			document.querySelectorAll('.chat-msg').forEach(m => {
				if (tab === 'gifts') {
					m.style.display = m.classList.contains('gift-msg') ? 'flex' : 'none'
				} else {
					m.style.display = 'flex'
				}
			})
		}

		// ─── Emoji append ─────────────────────────────────────────────────────────────
		function appendEmoji(e) {
			const input = document.getElementById('chatInput')
			input.value += e
			input.focus()
		}

		// ─── Load stream info ─────────────────────────────────────────────────────────
		async function loadStreamInfo() {
			try {
				const res = await fetch('/api/live/' + STREAM_KEY)
				const data = await res.json()
				document.getElementById('streamTitle').textContent = data.title || ''
				document.getElementById('hostName').textContent = data.hostName || ''
				document.getElementById('viewerBadge').textContent = '👁 ' + (data.viewerCount || 0)
				if (data.hostAvatar) document.getElementById('hostAvatar').src = data.hostAvatar
				if (data.status === 'ENDED') showEnded()
			} catch (e) {showEnded()}
		}

		async function getMyName() {
			try {
				const res = await fetch('/api/profile/me')
				const data = await res.json()
				myName = data.name || 'Viewer'
			} catch (e) { }
		}

		// ─── WebSocket ────────────────────────────────────────────────────────────────
		function connectWS() {
			const sock = new SockJS('/ws')
			stompClient = Stomp.over(sock)
			stompClient.debug = null

			stompClient.connect({}, () => {
				stompClient.subscribe('/topic/live/' + STREAM_KEY + '/offer', async msg => {
					const data = JSON.parse(msg.body)
					if (data.viewerId !== viewerId) return
					await handleOffer(data.offer)
				})
				stompClient.subscribe('/topic/live/' + STREAM_KEY + '/ice', async msg => {
					const data = JSON.parse(msg.body)
					if (!data.isHost || data.viewerId !== viewerId) return
					if (peerConnection && data.candidate)
						await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate))
				})
				stompClient.subscribe('/topic/live/' + STREAM_KEY + '/events', msg => {
					const data = JSON.parse(msg.body)
					if (data.type === 'STREAM_ENDED') showEnded()
					if (data.type === 'VIEWER_JOINED' || data.type === 'VIEWER_COUNT') {
						document.getElementById('viewerBadge').textContent = '👁 ' + data.viewerCount
						document.getElementById('onlineCount').textContent = data.viewerCount + ' online'
					}
					if (data.type === 'VIEWER_JOINED')
						addChat('system', data.viewerName + ' join kiya! 👋')
					if (data.type === 'REACTION')
						spawnFloat(data.emoji || '❤️')
				})
				stompClient.subscribe('/topic/live/' + STREAM_KEY + '/chat', msg => {
					const data = JSON.parse(msg.body)
					if (data.type === 'GIFT') {
						addChat(data.senderName, data.message, 'gift-msg')
						showGiftNotif(data.senderName, data.message)
					} else if (data.type === 'REACTION') {
						addChat(data.senderName, data.message, 'react-msg')
						spawnFloat(data.message)
					} else {
						addChat(data.senderName, data.message)
					}
				})
				stompClient.send('/app/live.join', {}, JSON.stringify({
					streamKey: STREAM_KEY, viewerId, viewerName: myName
				}))
			})
		}

		// ─── WebRTC ───────────────────────────────────────────────────────────────────
		async function handleOffer(offer) {
			peerConnection = new RTCPeerConnection(STUN_SERVERS)
			peerConnection.ontrack = e => {
				const video = document.getElementById('remoteVideo')
				if (e.streams?.[0]) {
					video.srcObject = e.streams[0]
					document.getElementById('loadingOverlay').style.display = 'none'
				}
			}
			peerConnection.onicecandidate = e => {
				if (e.candidate) stompClient.send('/app/live.ice', {}, JSON.stringify({
					streamKey: STREAM_KEY, candidate: e.candidate, viewerId, isHost: false
				}))
			}
			peerConnection.onconnectionstatechange = () => {
				const badge = document.getElementById('qualityBadge')
				const state = peerConnection.connectionState
				if (state === 'connected') {badge.textContent = 'HD'; badge.style.color = '#10b981'}
				if (state === 'connecting') {badge.textContent = '...'; badge.style.color = '#f59e0b'}
				if (state === 'disconnected') {badge.textContent = 'Lost'; badge.style.color = '#f43f5e'}
			}
			await peerConnection.setRemoteDescription(new RTCSessionDescription(offer))
			const answer = await peerConnection.createAnswer()
			await peerConnection.setLocalDescription(answer)
			stompClient.send('/app/live.answer', {}, JSON.stringify({
				streamKey: STREAM_KEY, answer: peerConnection.localDescription, viewerId
			}))
		}

		// ─── Chat ─────────────────────────────────────────────────────────────────────
		function sendChat() {
			const input = document.getElementById('chatInput')
			const text = input.value.trim()
			if (!text || !stompClient) return
			input.value = ''
			stompClient.send('/app/live.chat', {}, JSON.stringify({
				streamKey: STREAM_KEY, senderName: myName, message: text
			}))
		}

		function addChat(sender, text, cssClass) {
			const box = document.getElementById('chatMsgs')
			if (sender === 'system') {
				const div = document.createElement('div')
				div.className = 'chat-system'
				div.textContent = text
				box.appendChild(div)
			} else {
				const div = document.createElement('div')
				div.className = 'chat-msg' + (cssClass ? ' ' + cssClass : '')
				if (activeTab === 'gifts' && !cssClass?.includes('gift')) div.style.display = 'none'
				div.innerHTML = '<span class="sender">' + sender + '</span>' +
					'<span class="text">' + text + '</span>'
				box.appendChild(div)
			}
			box.scrollTop = box.scrollHeight
			while (box.children.length > 200) box.removeChild(box.firstChild)
		}

		function showGiftNotif(name, msg) {
			const el = document.getElementById('giftNotif')
			el.textContent = name + ' ' + msg
			el.style.display = 'block'
			setTimeout(() => {el.style.display = 'none'}, 3500)
		}

		function showEnded() {
			document.getElementById('endedOverlay').style.display = 'flex'
			document.getElementById('loadingOverlay').style.display = 'none'
		}

		// ─── Init ─────────────────────────────────────────────────────────────────────
		document.addEventListener('DOMContentLoaded', () => {
			document.getElementById('chatInput').addEventListener('keydown', e => {
				if (e.key === 'Enter') sendChat()
			})
			initGiftGrid()
		})

		window.addEventListener('beforeunload', () => {
			stompClient?.send('/app/live.leave', {}, JSON.stringify({streamKey: STREAM_KEY, viewerId}))
		})

		async function init() {
			await getMyName()
			await loadStreamInfo()
			if (document.getElementById('endedOverlay').style.display !== 'flex') {
				connectWS()
			}
		}

		init()
	</script>
</body>
