<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Reset Password | AI Feed</title>
	<style>
		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0
		}

		body {
			background: #0a0a14;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			font-family: 'Segoe UI', sans-serif;
			padding: 20px
		}

		.card {
			background: #111;
			border-radius: 20px;
			padding: 44px 36px;
			max-width: 440px;
			width: 100%;
			box-shadow: 0 24px 80px rgba(0, 0, 0, .6)
		}

		.icon {
			font-size: 3rem;
			margin-bottom: 16px;
			text-align: center
		}

		h1 {
			color: #fff;
			font-size: 1.3rem;
			font-weight: 800;
			margin-bottom: 6px;
			text-align: center
		}

		.sub {
			color: #555;
			font-size: 0.85rem;
			text-align: center;
			margin-bottom: 28px
		}

		.form-group {
			margin-bottom: 16px
		}

		.form-group label {
			display: block;
			color: #888;
			font-size: 0.75rem;
			font-weight: 600;
			text-transform: uppercase;
			letter-spacing: .4px;
			margin-bottom: 5px
		}

		.form-group input {
			width: 100%;
			padding: 11px 14px;
			background: #1a1a1a;
			border: 1.5px solid #222;
			border-radius: 10px;
			color: #eee;
			font-size: 0.88rem;
			outline: none
		}

		.form-group input:focus {
			border-color: #4f46e5
		}

		.strength-bar {
			height: 4px;
			border-radius: 2px;
			background: #222;
			margin-top: 6px;
			transition: all .3s
		}

		.strength-bar.weak {
			background: #e74c3c;
			width: 30%
		}

		.strength-bar.medium {
			background: #f59e0b;
			width: 65%
		}

		.strength-bar.strong {
			background: #27ae60;
			width: 100%
		}

		.btn {
			width: 100%;
			padding: 13px;
			background: linear-gradient(135deg, #4f46e5, #7c3aed);
			color: #fff;
			border: none;
			border-radius: 10px;
			font-size: 0.95rem;
			font-weight: 700;
			cursor: pointer;
			margin-bottom: 14px
		}

		.btn:hover {
			opacity: .88
		}

		.btn:disabled {
			opacity: .4;
			cursor: not-allowed
		}

		.alert {
			padding: 11px 14px;
			border-radius: 9px;
			font-size: 0.85rem;
			margin-bottom: 16px;
			display: none
		}

		.alert-success {
			background: rgba(39, 174, 96, .12);
			border: 1px solid #27ae60;
			color: #6bcf8d
		}

		.alert-error {
			background: rgba(231, 76, 60, .12);
			border: 1px solid #e74c3c;
			color: #ff6b6b
		}

		.back {
			text-align: center;
			color: #555;
			font-size: 0.83rem
		}

		.back a {
			color: #4f46e5;
			text-decoration: none;
			font-weight: 600
		}
	</style>
</head>

<body>
	<div class="card">
		<div class="icon">🔑</div>
		<h1>Naya Password Set Karo</h1>
		<p class="sub">Strong password use karo — min 6 characters</p>

		<div id="alert" class="alert"></div>

		<input type="hidden" id="resetToken" th:value="${token}">

		<div class="form-group">
			<label>Naya Password</label>
			<input type="password" id="newPassword" placeholder="Min 6 characters" oninput="checkStrength(this.value)">
			<div class="strength-bar" id="strengthBar"></div>
		</div>
		<div class="form-group">
			<label>Confirm Password</label>
			<input type="password" id="confirmPassword" placeholder="Password dobara likho">
		</div>
		<button class="btn" id="submitBtn" onclick="resetPassword()">🔐 Password Set Karo</button>
		<div class="back"><a href="/login">Login page pe jaao</a></div>
	</div>

	<script>
		function checkStrength(val) {
			const bar = document.getElementById('strengthBar')
			if (val.length < 6) {bar.className = 'strength-bar weak'}
			else if (val.length < 10 || !/[A-Z]/.test(val) || !/[0-9]/.test(val)) {bar.className = 'strength-bar medium'}
			else {bar.className = 'strength-bar strong'}
		}

		async function resetPassword() {
			const np = document.getElementById('newPassword').value
			const cp = document.getElementById('confirmPassword').value
			const token = document.getElementById('resetToken').value

			if (np !== cp) {showAlert('Passwords match nahi kar rahe', 'error'); return }
			if (np.length < 6) {showAlert('Password min 6 characters ka hona chahiye', 'error'); return }

			const btn = document.getElementById('submitBtn')
			btn.disabled = true
			btn.textContent = 'Set kar raha hun...'

			try {
				const res = await fetch('/api/account/reset-password', {
					method: 'POST',
					headers: {'Content-Type': 'application/json'},
					body: JSON.stringify({token, newPassword: np})
				})
				const data = await res.json()
				showAlert(data.message, data.success ? 'success' : 'error')
				if (data.success) {
					setTimeout(() => window.location.href = '/login', 2000)
				} else {
					btn.disabled = false
					btn.textContent = '🔐 Password Set Karo'
				}
			} catch (e) {
				showAlert('Network error. Dobara try karo.', 'error')
				btn.disabled = false
				btn.textContent = '🔐 Password Set Karo'
			}
		}

		function showAlert(msg, type) {
			const el = document.getElementById('alert')
			el.className = 'alert alert-' + type
			el.textContent = msg
			el.style.display = 'block'
		}
	</script>
</body>

</html>
