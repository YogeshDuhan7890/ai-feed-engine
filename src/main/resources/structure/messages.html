<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Messages | AI Feed</title>
	<meta th:name="_csrf" th:content="${_csrf.token}" />
	<meta th:name="_csrf_header" th:content="${_csrf.headerName}" />
	<link rel="stylesheet" href="/css/main.css">
	<style>
		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0
		}

		body {
			background: #07070f;
			color: #f1f1f8;
			font-family: 'DM Sans', 'Segoe UI', sans-serif;
		}

		.dm-wrap {
			display: flex;
			height: calc(100vh - 60px);
			margin-top: 60px;
			max-width: 1100px;
			margin-left: auto;
			margin-right: auto;
			border-left: 1px solid rgba(255, 255, 255, .06);
			border-right: 1px solid rgba(255, 255, 255, .06);
		}

		/* ══ INBOX ══ */
		.inbox {
			width: 320px;
			flex-shrink: 0;
			display: flex;
			flex-direction: column;
			border-right: 1px solid rgba(255, 255, 255, .07);
			background: #0a0a14;
		}

		.inbox-top {
			padding: 16px;
			border-bottom: 1px solid rgba(255, 255, 255, .06);
			display: flex;
			align-items: center;
			justify-content: space-between;
			background: rgba(255, 255, 255, .02);
		}

		.inbox-title {
			font-size: 17px;
			font-weight: 800;
			background: linear-gradient(135deg, #a5b4fc, #818cf8);
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
		}

		.new-chat-btn {
			background: linear-gradient(135deg, #4f46e5, #7c3aed);
			border: none;
			color: #fff;
			width: 34px;
			height: 34px;
			border-radius: 50%;
			cursor: pointer;
			font-size: 18px;
			display: flex;
			align-items: center;
			justify-content: center;
			transition: opacity .2s, transform .2s;
		}

		.new-chat-btn:hover {
			opacity: .85;
			transform: scale(1.08)
		}

		.inbox-search {
			padding: 10px 14px;
			border-bottom: 1px solid rgba(255, 255, 255, .05);
		}

		.inbox-search input {
			width: 100%;
			background: rgba(255, 255, 255, .06);
			border: 1px solid rgba(255, 255, 255, .1);
			border-radius: 20px;
			padding: 8px 14px;
			color: #f1f1f8;
			font-size: 13px;
			outline: none;
			transition: border-color .2s;
		}

		.inbox-search input:focus {
			border-color: #6366f1
		}

		.inbox-search input::placeholder {
			color: #4b5563
		}

		/* New chat user search panel */
		#userSearchPanel {
			display: none;
			border-bottom: 1px solid rgba(255, 255, 255, .06);
		}

		#userSearchPanel input {
			width: 100%;
			background: rgba(255, 255, 255, .06);
			border: none;
			border-bottom: 1px solid rgba(255, 255, 255, .06);
			padding: 10px 16px;
			color: #f1f1f8;
			font-size: 13px;
			outline: none;
		}

		#userSearchPanel input::placeholder {
			color: #4b5563
		}

		.inbox-list {
			flex: 1;
			overflow-y: auto
		}

		.inbox-list::-webkit-scrollbar {
			width: 3px
		}

		.inbox-list::-webkit-scrollbar-thumb {
			background: #1e1e2e;
			border-radius: 2px
		}

		/* Inbox item */
		.inbox-item {
			display: flex;
			align-items: center;
			gap: 11px;
			padding: 13px 16px;
			cursor: pointer;
			border-bottom: 1px solid rgba(255, 255, 255, .04);
			transition: background .15s;
			position: relative;
		}

		.inbox-item:hover {
			background: rgba(255, 255, 255, .03)
		}

		.inbox-item.active {
			background: rgba(99, 102, 241, .12)
		}

		.inbox-avatar {
			position: relative;
			flex-shrink: 0;
		}

		.inbox-avatar img,
		.inbox-avatar .av-fallback {
			width: 44px;
			height: 44px;
			border-radius: 50%;
			object-fit: cover;
		}

		.av-fallback {
			background: #1a1a2e;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 1.2rem;
		}

		.online-dot {
			position: absolute;
			bottom: 1px;
			right: 1px;
			width: 11px;
			height: 11px;
			background: #10b981;
			border-radius: 50%;
			border: 2px solid #0a0a14;
		}

		.inbox-info {
			flex: 1;
			min-width: 0
		}

		.inbox-row1 {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 3px;
		}

		.inbox-name {
			font-size: 14px;
			font-weight: 700;
			color: #e5e7eb;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			max-width: 150px;
		}

		.inbox-time {
			font-size: 11px;
			color: #4b5563;
			flex-shrink: 0
		}

		.inbox-preview {
			font-size: 12.5px;
			color: #6b7280;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.inbox-preview.unread {
			color: #a5b4fc;
			font-weight: 600
		}

		.unread-badge {
			background: #6366f1;
			color: #fff;
			font-size: 10px;
			font-weight: 800;
			padding: 2px 6px;
			border-radius: 10px;
			min-width: 18px;
			text-align: center;
		}

		/* ══ CHAT PANEL ══ */
		.chat-panel {
			flex: 1;
			display: flex;
			flex-direction: column;
			min-width: 0;
			background: #07070f;
		}

		/* Empty state */
		.no-chat {
			flex: 1;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			gap: 12px;
			color: #2a2a3e;
		}

		.no-chat-icon {
			font-size: 4rem;
			opacity: .3
		}

		.no-chat-title {
			font-size: 18px;
			font-weight: 700;
			color: #374151
		}

		.no-chat-sub {
			font-size: 13px;
			color: #2a2a3e
		}

		/* Chat header */
		.chat-head {
			display: none;
			padding: 12px 18px;
			border-bottom: 1px solid rgba(255, 255, 255, .07);
			align-items: center;
			gap: 12px;
			background: rgba(255, 255, 255, .02);
			backdrop-filter: blur(10px);
		}

		.chat-head.visible {
			display: flex
		}

		.chat-head-info {
			flex: 1
		}

		.chat-head-name {
			font-size: 15px;
			font-weight: 800;
			color: #f1f1f8
		}

		.chat-head-status {
			font-size: 11.5px;
			color: #10b981;
			margin-top: 1px
		}

		.chat-head-actions {
			display: flex;
			gap: 6px
		}

		.head-action-btn {
			background: rgba(255, 255, 255, .06);
			border: none;
			color: #9ca3af;
			width: 34px;
			height: 34px;
			border-radius: 50%;
			cursor: pointer;
			font-size: 15px;
			display: flex;
			align-items: center;
			justify-content: center;
			transition: background .15s, color .15s;
		}

		.head-action-btn:hover {
			background: rgba(255, 255, 255, .1);
			color: #f1f1f8
		}

		.head-action-btn.danger:hover {
			background: rgba(239, 68, 68, .15);
			color: #f87171
		}

		/* Messages area */
		.msg-area {
			flex: 1;
			overflow-y: auto;
			padding: 16px 18px;
			display: flex;
			flex-direction: column;
			gap: 2px;
			display: none;
		}

		.msg-area.visible {
			display: flex
		}

		.msg-area::-webkit-scrollbar {
			width: 3px
		}

		.msg-area::-webkit-scrollbar-thumb {
			background: #1a1a2e;
			border-radius: 2px
		}

		/* Date separator */
		.date-sep {
			text-align: center;
			color: #374151;
			font-size: 11px;
			padding: 8px 0;
			display: flex;
			align-items: center;
			gap: 10px;
		}

		.date-sep::before,
		.date-sep::after {
			content: '';
			flex: 1;
			height: 1px;
			background: rgba(255, 255, 255, .05);
		}

		/* Message bubble */
		.msg-wrap {
			display: flex;
			align-items: flex-end;
			gap: 6px;
			margin-bottom: 2px;
		}

		.msg-wrap.me {
			justify-content: flex-end
		}

		.msg-wrap.them {
			justify-content: flex-start
		}

		.msg-bubble {
			max-width: 65%;
			padding: 9px 13px 7px;
			word-break: break-word;
			position: relative;
			cursor: pointer;
		}

		.msg-wrap.me .msg-bubble {
			background: linear-gradient(135deg, #4f46e5, #7c3aed);
			border-radius: 18px 18px 4px 18px;
			color: #fff;
		}

		.msg-wrap.them .msg-bubble {
			background: #1a1a2e;
			border: 1px solid rgba(255, 255, 255, .07);
			border-radius: 18px 18px 18px 4px;
			color: #e5e7eb;
		}

		.msg-text {
			font-size: 14px;
			line-height: 1.5
		}

		.msg-img {
			max-width: 220px;
			border-radius: 10px;
			display: block;
			margin-bottom: 4px;
		}

		.msg-meta {
			display: flex;
			align-items: center;
			justify-content: flex-end;
			gap: 3px;
			margin-top: 3px;
		}

		.msg-time {
			font-size: 10.5px;
			opacity: .55
		}

		.msg-tick {
			font-size: 11px
		}

		.msg-tick.read {
			color: #a5f3fc
		}

		.msg-tick.sent {
			opacity: .45
		}

		/* Reactions on bubble */
		.msg-reactions {
			display: flex;
			gap: 3px;
			flex-wrap: wrap;
			margin-top: 4px;
		}

		.msg-react-chip {
			background: rgba(255, 255, 255, .1);
			border-radius: 10px;
			padding: 1px 6px;
			font-size: 12px;
			cursor: pointer;
		}

		/* Typing indicator */
		.typing-indicator {
			display: none;
			align-items: center;
			gap: 10px;
			padding: 8px 18px;
		}

		.typing-indicator.visible {
			display: flex
		}

		.typing-dots {
			background: #1a1a2e;
			border-radius: 12px;
			padding: 8px 14px;
			display: flex;
			gap: 4px;
		}

		.typing-dots span {
			width: 6px;
			height: 6px;
			background: #6b7280;
			border-radius: 50%;
			animation: typingBounce 1.2s infinite;
		}

		.typing-dots span:nth-child(2) {
			animation-delay: .2s
		}

		.typing-dots span:nth-child(3) {
			animation-delay: .4s
		}

		@keyframes typingBounce {

			0%,
			60%,
			100% {
				transform: translateY(0)
			}

			30% {
				transform: translateY(-6px);
				background: #818cf8
			}
		}

		/* Input area */
		.chat-input-wrap {
			display: none;
			padding: 10px 14px 12px;
			border-top: 1px solid rgba(255, 255, 255, .07);
			background: rgba(255, 255, 255, .02);
		}

		.chat-input-wrap.visible {
			display: block
		}

		.input-row {
			display: flex;
			gap: 8px;
			align-items: flex-end;
		}

		.input-actions {
			display: flex;
			gap: 2px;
			align-items: center
		}

		.iaction-btn {
			background: none;
			border: none;
			color: #4b5563;
			font-size: 20px;
			padding: 6px;
			border-radius: 8px;
			cursor: pointer;
			transition: color .15s, background .15s;
		}

		.iaction-btn:hover {
			color: #818cf8;
			background: rgba(99, 102, 241, .1)
		}

		.msg-input {
			flex: 1;
			background: rgba(255, 255, 255, .07);
			border: 1px solid rgba(255, 255, 255, .1);
			border-radius: 22px;
			padding: 10px 16px;
			color: #f1f1f8;
			font-size: 14px;
			outline: none;
			resize: none;
			max-height: 120px;
			line-height: 1.4;
			transition: border-color .2s;
		}

		.msg-input:focus {
			border-color: #6366f1
		}

		.msg-input::placeholder {
			color: #4b5563
		}

		.send-btn {
			background: linear-gradient(135deg, #4f46e5, #7c3aed);
			border: none;
			color: #fff;
			width: 42px;
			height: 42px;
			border-radius: 50%;
			cursor: pointer;
			font-size: 18px;
			display: flex;
			align-items: center;
			justify-content: center;
			flex-shrink: 0;
			transition: opacity .2s, transform .2s;
		}

		.send-btn:hover {
			opacity: .85;
			transform: scale(1.07)
		}

		.send-btn:disabled {
			opacity: .3;
			cursor: default;
			transform: none
		}

		.char-count {
			text-align: right;
			font-size: 10px;
			color: #4b5563;
			height: 14px;
			margin-top: 4px;
		}

		/* Emoji picker */
		.emoji-picker-wrap {
			display: none;
			flex-wrap: wrap;
			gap: 4px;
			padding: 8px 0;
			max-height: 80px;
			overflow-y: auto;
		}

		.emoji-picker-wrap.open {
			display: flex
		}

		.emoji-opt {
			font-size: 20px;
			cursor: pointer;
			padding: 4px;
			border-radius: 6px;
			transition: background .15s;
		}

		.emoji-opt:hover {
			background: rgba(255, 255, 255, .1)
		}

		/* Quick reaction picker */
		.quick-react {
			position: absolute;
			top: -36px;
			left: 0;
			background: #1a1a2e;
			border: 1px solid rgba(255, 255, 255, .1);
			border-radius: 20px;
			padding: 4px 8px;
			display: none;
			gap: 6px;
			z-index: 10;
		}

		.quick-react.open {
			display: flex
		}

		.quick-react span {
			font-size: 18px;
			cursor: pointer;
			transition: transform .15s
		}

		.quick-react span:hover {
			transform: scale(1.3)
		}

		/* Image preview */
		.img-preview {
			display: none;
			background: rgba(255, 255, 255, .05);
			border-radius: 12px;
			padding: 8px 12px;
			margin-bottom: 8px;
			align-items: center;
			gap: 10px;
		}

		.img-preview.visible {
			display: flex
		}

		.img-preview img {
			width: 50px;
			height: 50px;
			border-radius: 8px;
			object-fit: cover
		}

		.img-preview-name {
			flex: 1;
			font-size: 12px;
			color: #9ca3af;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis
		}

		.img-preview-remove {
			background: none;
			border: none;
			color: #f87171;
			cursor: pointer;
			font-size: 16px
		}

		/* Mobile */
		@media (max-width: 640px) {
			.inbox {
				width: 100%;
				display: block
			}

			.chat-panel {
				display: none
			}

			.chat-panel.mobile-open {
				display: flex
			}

			.dm-wrap {
				flex-direction: column;
				height: auto;
				min-height: calc(100vh - 60px)
			}
		}
	</style>
</head>

<body>
	<div th:replace="~{components/header :: header}"></div>

	<div class="dm-wrap">

		<!-- ══ INBOX ══ -->
		<div class="inbox">
			<div class="inbox-top">
				<span class="inbox-title">💬 Messages</span>
				<button class="new-chat-btn" id="newChatBtn" title="New Message">✎</button>
			</div>

			<!-- New chat search -->
			<div id="userSearchPanel">
				<input id="userSearchInput" type="text" placeholder="🔍 User dhundho...">
				<div id="userSearchResults"></div>
			</div>

			<div class="inbox-search">
				<input id="dmSearchInput" type="text" placeholder="🔍 Search conversations...">
			</div>

			<div class="inbox-list" id="inboxList">
				<div style="text-align:center;padding:40px 20px;color:#374151">
					<div style="font-size:2rem;margin-bottom:8px;opacity:.4">⏳</div>
					<div style="font-size:13px">Loading...</div>
				</div>
			</div>
		</div>

		<!-- ══ CHAT PANEL ══ -->
		<div class="chat-panel" id="chatPanel">

			<!-- No chat selected -->
			<div class="no-chat" id="noChatMsg">
				<div class="no-chat-icon">✉️</div>
				<div class="no-chat-title">Kisi se baat karo</div>
				<div class="no-chat-sub">Left side se conversation select karo</div>
			</div>

			<!-- Chat header -->
			<div class="chat-head" id="chatHead">
				<div id="chatHeadAvatar"></div>
				<div class="chat-head-info">
					<div class="chat-head-name" id="chatHeadName"></div>
					<div class="chat-head-status" id="chatHeadStatus">● Online</div>
				</div>
				<div class="chat-head-actions">
					<a id="profileBtn" href="#" class="head-action-btn" title="Profile">👤</a>
					<button class="head-action-btn danger" id="deleteConvoBtn"
						title="Conversation delete karo">🗑</button>
				</div>
			</div>

			<!-- Typing indicator -->
			<div class="typing-indicator" id="typingIndicator">
				<div class="typing-dots">
					<span></span><span></span><span></span>
				</div>
				<span style="font-size:12px;color:#6b7280" id="typingName"></span>
			</div>

			<!-- Messages -->
			<div class="msg-area" id="msgArea"></div>

			<!-- Input area -->
			<div class="chat-input-wrap" id="chatInputWrap">
				<!-- Image preview -->
				<div class="img-preview" id="imgPreview">
					<img id="imgPreviewThumb" src="" alt="">
					<span class="img-preview-name" id="imgPreviewName"></span>
					<button class="img-preview-remove" id="imgPreviewRemove">✕</button>
				</div>

				<!-- Emoji picker -->
				<div class="emoji-picker-wrap" id="emojiPicker"></div>

				<div class="input-row">
					<div class="input-actions">
						<button class="iaction-btn" id="emojiBtn" title="Emoji">😊</button>
						<button class="iaction-btn" id="imgBtn" title="Image bhejo">🖼</button>
        <input type="file" id="imgFileInput" accept="image/jpeg,image/png,.jpg,.png" style="display:none">
					</div>
					<textarea class="msg-input" id="msgInput" placeholder="Message likho..." rows="1"></textarea>
					<button class="send-btn" id="sendBtn">➤</button>
				</div>
				<div class="char-count" id="charCount"></div>
			</div>

		</div>
	</div>

	<script th:src="@{/js/messages.js}"></script>
	<script>
		/* ── New chat button ── */
		const newChatBtn = document.getElementById('newChatBtn')
		const userSearchPanel = document.getElementById('userSearchPanel')
		const userSearchInput = document.getElementById('userSearchInput')
		const userSearchResults = document.getElementById('userSearchResults')

		newChatBtn?.addEventListener('click', () => {
			const isOpen = userSearchPanel.style.display === 'block'
			userSearchPanel.style.display = isOpen ? 'none' : 'block'
			if (!isOpen) {userSearchInput.value = ''; userSearchResults.innerHTML = ''; userSearchInput.focus()}
		})

		let searchTimer = null
		userSearchInput?.addEventListener('input', () => {
			clearTimeout(searchTimer)
			const q = userSearchInput.value.trim()
			if (!q) {userSearchResults.innerHTML = ''; return }
			searchTimer = setTimeout(() => doUserSearch(q), 300)
		})

		async function doUserSearch(q) {
			userSearchResults.innerHTML = '<div style="padding:10px 16px;color:#6b7280;font-size:13px">Searching...</div>'
			try {
				const res = await fetch('/api/search/users?q=' + encodeURIComponent(q))
				const users = await res.json()
				userSearchResults.innerHTML = ''
				if (!users?.length) {
					userSearchResults.innerHTML = '<div style="padding:10px 16px;color:#4b5563;font-size:13px">Koi user nahi mila</div>'
					return
				}
				users.slice(0, 8).forEach(u => {
					const row = document.createElement('div')
					row.style.cssText = 'display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.05);transition:background .15s;'
					row.onmouseenter = () => row.style.background = 'rgba(255,255,255,.04)'
					row.onmouseleave = () => row.style.background = ''
					const av = document.createElement('div')
					av.style.cssText = 'width:38px;height:38px;border-radius:50%;background:#1a1a2e;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;'
					if (u.avatar) {const img = document.createElement('img'); img.src = u.avatar; img.style.cssText = 'width:100%;height:100%;object-fit:cover;'; av.appendChild(img)}
					else av.textContent = '👤'
					const nm = document.createElement('div')
					nm.style.cssText = 'font-size:14px;font-weight:600;color:#e5e7eb;'
					nm.textContent = u.name || 'User'
					row.append(av, nm)
					row.addEventListener('click', async () => {
						userSearchPanel.style.display = 'none'
						userSearchInput.value = ''
						userSearchResults.innerHTML = ''
						await window.openChat(u.id, u.name, u.avatar)
					})
					userSearchResults.appendChild(row)
				})
			} catch {
				userSearchResults.innerHTML = '<div style="padding:10px 16px;color:#f87171;font-size:13px">Search fail ho gayi</div>'
			}
		}
	</script>
</body>

</html>
