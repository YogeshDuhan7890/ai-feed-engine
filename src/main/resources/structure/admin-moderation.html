<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>AI Content Moderation — AI Feed Admin</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
	<link rel="stylesheet" th:href="@{/css/pages/admin.css}">
	<meta name="_csrf" th:content="${_csrf.token}" />
	<meta name="_csrf_header" th:content="${_csrf.headerName}" />
</head>

<body>
	<div th:replace="~{components/admin-sidebar :: adminSidebar(activePage='moderation')}"></div>
	<div class="main-content">

		<div class="d-flex justify-content-between align-items-center mb-4">
			<div>
				<h4 class="mb-0">🤖 AI Content Moderation</h4>
				<small class="text-muted">Rule-based scanner — banned words, spam patterns, suspicious content</small>
			</div>
			<div class="d-flex gap-2 align-items-center">
				<div class="form-check form-switch m-0">
					<input class="form-check-input" type="checkbox" id="aiModerationToggle" onchange="toggleAiModeration(this)">
					<label class="form-check-label small" for="aiModerationToggle">AI Assist</label>
				</div>
				<span id="aiModerationStatus" class="badge bg-secondary">Checking...</span>
				<select id="scanLimit" class="form-select form-select-sm" style="width:120px">
					<option value="20">Last 20</option>
					<option value="50">Last 50</option>
					<option value="100">Last 100</option>
					<option value="999">All Posts</option>
				</select>
				<button class="btn btn-primary" id="scanBtn" onclick="runScan()">🔍 Run Scan</button>
			</div>
		</div>

		<!-- Stats row -->
		<div class="row g-3 mb-4">
			<div class="col-md-3">
				<div class="card shadow-sm p-3 text-center">
					<h4 id="statScanned" class="text-primary mb-0">—</h4><small class="text-muted">Posts Scanned</small>
				</div>
			</div>
			<div class="col-md-3">
				<div class="card shadow-sm p-3 text-center">
					<h4 id="statFlagged" class="text-danger mb-0">—</h4><small class="text-muted">Flagged</small>
				</div>
			</div>
			<div class="col-md-3">
				<div class="card shadow-sm p-3 text-center">
					<h4 id="statHigh" class="text-danger mb-0">—</h4><small class="text-muted">High Severity</small>
				</div>
			</div>
			<div class="col-md-3">
				<div class="card shadow-sm p-3 text-center">
					<h4 id="statClean" class="text-success mb-0">—</h4><small class="text-muted">Clean Posts</small>
				</div>
			</div>
		</div>

		<!-- Filter -->
		<div class="d-flex gap-2 mb-3">
			<button class="btn btn-sm btn-outline-secondary active" id="filterAll"
				onclick="filterResults('all')">All</button>
			<button class="btn btn-sm btn-outline-danger" id="filterHigh" onclick="filterResults('HIGH')">🔴
				High</button>
			<button class="btn btn-sm btn-outline-warning" id="filterMed" onclick="filterResults('MEDIUM')">🟡
				Medium</button>
			<button class="btn btn-sm btn-outline-info" id="filterLow" onclick="filterResults('LOW')">🔵 Low</button>
			<button class="btn btn-sm btn-outline-success ms-auto" onclick="bulkAction()">🙈 Hide All Flagged</button>
		</div>

		<div id="resultsContainer">
			<div class="text-muted text-center py-5">
				<div style="font-size:3rem">🤖</div>
				<p>Scan karein content moderate karne ke liye</p>
			</div>
		</div>
	</div>
	<script th:inline="javascript">
		const CSRF_TOKEN = /*[[${_csrf.token}]]*/ '';
		const CSRF_HEADER = /*[[${_csrf.headerName}]]*/ 'X-CSRF-TOKEN';
	</script>
	<script th:src="@{/js/admin-moderation.js}"></script>

	<button id="darkModeToggle" onclick="toggleDark()" title="Toggle Dark Mode">🌙</button>
	<script>
		function toggleDark() {
			document.body.classList.toggle('dark-mode');
			const isDark = document.body.classList.contains('dark-mode');
			localStorage.setItem('adminDarkMode', isDark);
			document.getElementById('darkModeToggle').textContent = isDark ? '☀️' : '🌙';
		}
		if (localStorage.getItem('adminDarkMode') === 'true') {
			document.body.classList.add('dark-mode');
			const btn = document.getElementById('darkModeToggle');
			if (btn) btn.textContent = '☀️';
		}
	</script>
</body>

</html>
