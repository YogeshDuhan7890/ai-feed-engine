<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<title>Maintenance | AI Feed</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<style>
		:root {
			color-scheme: dark;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			padding: 24px;
			background:
				radial-gradient(circle at top, rgba(99, 102, 241, 0.18), transparent 36%),
				linear-gradient(180deg, #09090f 0%, #111122 100%);
			color: #f8fafc;
			font-family: "Segoe UI", Arial, sans-serif;
		}

		.maintenance-card {
			width: min(560px, 100%);
			background: rgba(15, 23, 42, 0.82);
			border: 1px solid rgba(148, 163, 184, 0.14);
			border-radius: 28px;
			padding: 36px 32px;
			box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
			text-align: center;
			backdrop-filter: blur(14px);
		}

		.badge {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			padding: 8px 14px;
			border-radius: 999px;
			background: rgba(99, 102, 241, 0.14);
			border: 1px solid rgba(99, 102, 241, 0.28);
			color: #c7d2fe;
			font-size: 0.78rem;
			font-weight: 700;
			letter-spacing: 0.08em;
			text-transform: uppercase;
		}

		h1 {
			margin: 18px 0 10px;
			font-size: clamp(2rem, 4vw, 2.6rem);
			line-height: 1.1;
		}

		p {
			margin: 0;
			color: #cbd5e1;
			font-size: 1rem;
			line-height: 1.7;
		}

		.note {
			margin-top: 18px;
			font-size: 0.86rem;
			color: #94a3b8;
		}

		.actions {
			margin-top: 26px;
			display: flex;
			justify-content: center;
			gap: 12px;
			flex-wrap: wrap;
		}

		.btn {
			padding: 12px 18px;
			border-radius: 14px;
			text-decoration: none;
			font-weight: 700;
			font-size: 0.9rem;
			transition: transform 0.16s ease, opacity 0.16s ease;
		}

		.btn:hover {
			transform: translateY(-1px);
			opacity: 0.92;
		}

		.btn-primary {
			background: linear-gradient(135deg, #6366f1, #8b5cf6);
			color: white;
		}

		.btn-secondary {
			border: 1px solid rgba(148, 163, 184, 0.2);
			background: rgba(255, 255, 255, 0.03);
			color: #e2e8f0;
		}
	</style>
</head>
<body>
	<section class="maintenance-card">
		<div class="badge">Maintenance Mode</div>
		<h1>AI Feed abhi thodi der ke liye unavailable hai</h1>
		<p th:text="${maintenanceMessage}">Platform is under maintenance. Back soon!</p>
		<div class="note">Agar aap admin ho, to `/admin/settings` par ja kar maintenance flag off kar sakte ho.</div>
		<div class="actions">
			<a class="btn btn-primary" href="/login">Admin Login</a>
			<a class="btn btn-secondary" href="/maintenance">Refresh</a>
		</div>
	</section>
</body>
</html>
