<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Forgot Password | AI Feed</title>
	<style>
		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0
		}

		body {
			background: #0a0a14;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			font-family: 'Segoe UI', sans-serif;
			padding: 20px
		}

		.card {
			background: #111;
			border-radius: 20px;
			padding: 44px 36px;
			max-width: 440px;
			width: 100%;
			box-shadow: 0 24px 80px rgba(0, 0, 0, .6)
		}

		.icon {
			font-size: 3rem;
			margin-bottom: 16px;
			text-align: center
		}

		h1 {
			color: #fff;
			font-size: 1.3rem;
			font-weight: 800;
			margin-bottom: 6px;
			text-align: center
		}

		.sub {
			color: #555;
			font-size: 0.85rem;
			text-align: center;
			margin-bottom: 28px;
			line-height: 1.5
		}

		.form-group {
			margin-bottom: 16px
		}

		.form-group label {
			display: block;
			color: #888;
			font-size: 0.75rem;
			font-weight: 600;
			text-transform: uppercase;
			letter-spacing: .4px;
			margin-bottom: 5px
		}

		.form-group input {
			width: 100%;
			padding: 11px 14px;
			background: #1a1a1a;
			border: 1.5px solid #222;
			border-radius: 10px;
			color: #eee;
			font-size: 0.88rem;
			outline: none
		}

		.form-group input:focus {
			border-color: #4f46e5
		}

		.btn {
			width: 100%;
			padding: 13px;
			background: linear-gradient(135deg, #4f46e5, #7c3aed);
			color: #fff;
			border: none;
			border-radius: 10px;
			font-size: 0.95rem;
			font-weight: 700;
			cursor: pointer;
			margin-bottom: 14px
		}

		.btn:hover {
			opacity: .88
		}

		.btn:disabled {
			opacity: .4;
			cursor: not-allowed
		}

		.alert {
			padding: 11px 14px;
			border-radius: 9px;
			font-size: 0.85rem;
			margin-bottom: 16px;
			display: none
		}

		.alert-success {
			background: rgba(39, 174, 96, .12);
			border: 1px solid #27ae60;
			color: #6bcf8d
		}

		.alert-error {
			background: rgba(231, 76, 60, .12);
			border: 1px solid #e74c3c;
			color: #ff6b6b
		}

		.back {
			text-align: center;
			color: #555;
			font-size: 0.83rem
		}

		.back a {
			color: #4f46e5;
			text-decoration: none;
			font-weight: 600
		}
	</style>
</head>

<body>
	<div class="card">
		<div class="icon">🔐</div>
		<h1>Password Bhool Gaye?</h1>
		<p class="sub">Email daalo — reset link bhej denge. 30 minute mein click karna hoga.</p>

		<div id="alert" class="alert"></div>

		<div class="form-group">
			<label>Registered Email</label>
			<input type="email" id="emailInput" placeholder="apna@email.com">
		</div>
		<button class="btn" id="submitBtn" onclick="sendResetLink()">📧 Reset Link Bhejo</button>
		<div class="back">Yaad aa gaya? <a href="/login">Login karo</a></div>
	</div>

	<script>
		async function sendResetLink() {
			const email = document.getElementById('emailInput').value.trim()
			if (!email) {showAlert('Email daalo', 'error'); return }

			const btn = document.getElementById('submitBtn')
			btn.disabled = true
			btn.textContent = 'Bhej raha hun...'

			try {
				const res = await fetch('/api/account/forgot-password', {
					method: 'POST',
					headers: {'Content-Type': 'application/json'},
					body: JSON.stringify({email})
				})
				const data = await res.json()
				showAlert(data.message, 'success')
				btn.textContent = '✅ Bhej Diya'
			} catch (e) {
				showAlert('Kuch gadbad hui. Dobara try karo.', 'error')
				btn.disabled = false
				btn.textContent = '📧 Reset Link Bhejo'
			}
		}

		function showAlert(msg, type) {
			const el = document.getElementById('alert')
			el.className = 'alert alert-' + type
			el.textContent = msg
			el.style.display = 'block'
		}

		document.getElementById('emailInput').addEventListener('keydown', e => {
			if (e.key === 'Enter') sendResetLink()
		})
	</script>
</body>

</html>
