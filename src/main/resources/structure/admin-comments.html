<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Comments - AI Feed Admin</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
	<link rel="stylesheet" th:href="@{/css/pages/admin.css}">

	<meta name="_csrf" th:content="${_csrf.token}" />
	<meta name="_csrf_header" th:content="${_csrf.headerName}" />
</head>

<body>

	<!-- SIDEBAR -->
	<div th:replace="~{components/admin-sidebar :: adminSidebar(activePage='comments')}"></div>
	<div class="main-content">

		<!-- HEADER -->
		<div class="d-flex justify-content-between align-items-center mb-4">
			<h4 class="mb-0">Comments Moderation</h4>

			<div class="d-flex gap-2 align-items-center">
				<input type="text" id="commentSearch" placeholder="Search comments..."
					class="form-control form-control-sm search-bar" oninput="filterComments(this.value)">

				<span class="text-muted small" id="commentsCount"></span>
			</div>
		</div>

		<!-- Analytics Stats -->
		<div class="d-flex gap-3 mb-3">
			<div class="stat-box">Total <span id="totalComments">0</span></div>
			<div class="stat-box">Toxic <span id="toxicCount">0</span></div>
			<div class="stat-box">Users <span id="uniqueUsers">0</span></div>
		</div>

		<!-- Chart Card -->
		<div class="card shadow p-3 mb-3">
			<h6 class="mb-2">Moderation Insights</h6>

			<div class="chart-container">
				<canvas id="commentsChart"></canvas>
			</div>
		</div>

		<!-- TABLE -->
		<div class="card shadow p-3">

			<div id="commentsLoading" class="text-muted small text-center py-3">
				Loading comments...
			</div>

			<table class="table table-hover align-middle" id="commentsTableWrap" style="display:none;">

				<thead>
					<tr>
						<th>ID</th>
						<th>User</th>
						<th>Post</th>
						<th>Comment</th>
						<th>Toxicity</th>
						<th>Time</th>
						<th>Actions</th>
					</tr>
				</thead>

				<tbody id="commentsBody"></tbody>

			</table>
		</div>

	</div>

	<!-- TOAST -->
	<div id="adminToast"></div>

	<!-- SCRIPTS -->
	<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
	<script th:src="@{/js/admin-comments.js}"></script>
	<script th:src="@{/js/admin-realtime.js}"></script>

	<!-- START REALTIME -->
	<script>
		document.addEventListener('DOMContentLoaded', () => {
			if (typeof startRealtime === 'function') {
				startRealtime()
			}
		})
	</script>

</body>

</html>
