<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Admin Login History - AI Feed Admin</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
	<link rel="stylesheet" th:href="@{/css/pages/admin.css}">
	<meta name="_csrf" th:content="${_csrf.token}" />
	<meta name="_csrf_header" th:content="${_csrf.headerName}" />
</head>

<body>
	<div th:replace="~{components/admin-sidebar :: adminSidebar(activePage='login-history')}"></div>

	<div class="main-content">
		<div class="admin-topbar">
			<div>
				<h4 class="admin-page-title mb-1">Admin Login History</h4>
				<div class="admin-page-sub">Recent admin sign-ins, device details, and active sessions.</div>
			</div>
			<span class="badge bg-success fs-6" id="activeSessions">0 Active Sessions</span>
		</div>

		<div class="card shadow-sm">
			<div class="p-3 border-bottom d-flex flex-wrap justify-content-between align-items-center gap-2">
				<h6 class="mb-0">Login Records (<span id="totalCount">0</span>)</h6>
				<input
					type="text"
					id="searchInput"
					class="form-control form-control-sm search-bar"
					placeholder="Search email, IP, device..."
					oninput="filterHistory(this.value)">
			</div>

			<div class="table-responsive">
				<table class="table table-hover mb-0">
					<thead class="table-dark">
						<tr>
							<th>Time</th>
							<th>Email</th>
							<th>IP</th>
							<th>Device</th>
							<th>Location</th>
							<th>User Agent</th>
						</tr>
					</thead>
					<tbody id="historyBody">
						<tr>
							<td colspan="6" class="text-center text-muted py-4">Loading login history...</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>
	</div>

	<script th:inline="javascript">
		const CSRF_TOKEN = /*[[${_csrf.token}]]*/ '';
		const CSRF_HEADER = /*[[${_csrf.headerName}]]*/ 'X-CSRF-TOKEN';
	</script>
	<script th:src="@{/js/admin-login-history.js}"></script>
</body>

</html>
