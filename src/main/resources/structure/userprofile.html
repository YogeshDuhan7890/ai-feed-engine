<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Profile | AI Feed</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta th:name="_csrf" th:content="${_csrf.token}" />
	<meta th:name="_csrf_header" th:content="${_csrf.headerName}" />
	<link rel="stylesheet" th:href="@{/css/main.css}">
	<link rel="stylesheet" th:href="@{/css/pages/profile.css}">
	<style>
		body {
			background: #0a0a0f;
			color: #f1f1f8;
			font-family: 'Segoe UI', sans-serif;
			min-height: 100vh;
		}

		.profile-container {
			max-width: 880px;
			margin: 0 auto;
			padding: 88px 16px 100px;
		}

		.profile-header {
			display: flex;
			align-items: flex-start;
			gap: 28px;
			padding: 0 0 24px;
			border-bottom: 1px solid rgba(255, 255, 255, .08);
			margin-bottom: 24px;
		}

		.profile-avatar-wrap img {
			width: 120px;
			height: 120px;
			border-radius: 50%;
			object-fit: cover;
			border: 3px solid rgba(99, 102, 241, .45);
			background: #1a1a2e;
		}

		.profile-info {
			flex: 1;
			min-width: 0;
		}

		.profile-info h2 {
			font-size: 1.5rem;
			font-weight: 800;
			margin-bottom: 8px;
		}

		.profile-bio {
			font-size: .92rem;
			line-height: 1.55;
			color: #9ca3af;
			margin-bottom: 4px;
		}

		.profile-stats {
			display: flex;
			gap: 16px;
			margin-top: 18px;
			margin-bottom: 16px;
			flex-wrap: wrap;
		}

		.stat-item {
			min-width: 88px;
			padding: 8px 12px;
			border-radius: 12px;
			background: rgba(255, 255, 255, .04);
			cursor: pointer;
		}

		.stat-item:hover {
			background: rgba(255, 255, 255, .07);
		}

		.stat-num {
			display: block;
			font-size: 1.1rem;
			font-weight: 800;
			color: #fff;
		}

		.stat-label {
			display: block;
			font-size: .72rem;
			color: #9ca3af;
			text-transform: uppercase;
			letter-spacing: .4px;
			margin-top: 2px;
		}

		.edit-btn {
			background: rgba(255, 255, 255, .08);
			border: 1px solid rgba(255, 255, 255, .15);
			color: #f1f1f8;
			padding: 9px 18px;
			border-radius: 20px;
			cursor: pointer;
			font-size: .85rem;
			font-weight: 600;
		}

		.edit-btn:hover {
			background: rgba(255, 255, 255, .12);
		}

		.profile-videos {
			margin-top: 8px;
		}

		@media (max-width: 640px) {
			.profile-header {
				flex-direction: column;
				align-items: center;
				text-align: center;
			}

			.profile-stats {
				justify-content: center;
			}
		}
	</style>
</head>

<body>

	<div th:replace="~{components/header :: header}"></div>

	<div class="profile-container">

		<!-- Profile Header -->
		<div class="profile-header">

			<div class="profile-avatar-wrap">
				<img id="avatar" src="/images/default.png" alt="Avatar" onerror="this.src='/images/default.png'">
			</div>

			<div class="profile-info">
				<h2 id="name">Loading...</h2>
				<p id="bio" class="profile-bio"></p>
				<p id="interests" style="font-size:0.82rem;color:#818cf8;margin-top:4px;"></p>

				<div class="profile-stats">
					<div class="stat-item">
						<span id="videos" class="stat-num">0</span>
						<span class="stat-label">Videos</span>
					</div>
					<div class="stat-item" id="followersBtn" style="cursor:pointer;">
						<span id="followers" class="stat-num">0</span>
						<span class="stat-label">Followers</span>
					</div>
					<div class="stat-item" id="followingBtn" style="cursor:pointer;">
						<span id="following" class="stat-num">0</span>
						<span class="stat-label">Following</span>
					</div>
				</div>

				<!-- Action buttons -->
				<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;">
					<button id="followBtn" class="edit-btn" style="display:none;">Follow</button>
					<button id="msgBtn" class="edit-btn"
						style="display:none;background:#1a1a2e;border:1px solid #4f46e5;color:#a5b4fc;">💬
						Message</button>
					<button id="blockBtn" class="edit-btn"
						style="display:none;background:#1a1a1a;border:1px solid #e74c3c;color:#f87171;font-size:0.78rem;">Block</button>
					<button id="shareBtn" class="edit-btn"
						style="display:none;background:#1a1a2e;border:1px solid #374151;color:#9ca3af;font-size:0.78rem;">🔗
						Share</button>
				</div>
			</div>

		</div>

		<!-- Followers/Following Modal -->
		<div id="followModalBackdrop"
			style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:900;"></div>
		<div id="followModal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
			background:#0d0d1a;border:1px solid rgba(255,255,255,.1);border-radius:16px;
			width:90%;max-width:400px;max-height:70vh;overflow:hidden;z-index:901;flex-direction:column;">
			<div
				style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.07);">
				<span id="followModalTitle" style="font-weight:700;font-size:15px;color:#f1f1f8;">Followers</span>
				<button id="followModalClose"
					style="background:none;border:none;color:#9ca3af;font-size:20px;cursor:pointer;">✕</button>
			</div>
			<div id="followModalList" style="overflow-y:auto;flex:1;"></div>
		</div>

		<!-- Videos -->
		<div class="profile-videos">
			<div class="video-grid" id="videoGrid">
				<p style="color:#555;padding:20px;">Loading...</p>
			</div>
		</div>

	</div>

	<script th:src="@{/js/userProfile.js}"></script>

</body>

</html>
