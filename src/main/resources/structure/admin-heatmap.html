<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Engagement Heatmap — AI Feed Admin</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
	<link rel="stylesheet" th:href="@{/css/pages/admin.css}">
	<meta name="_csrf" th:content="${_csrf.token}" />
	<meta name="_csrf_header" th:content="${_csrf.headerName}" />
</head>

<body>
	<div th:replace="~{components/admin-sidebar :: adminSidebar(activePage='heatmap')}"></div>
	<div class="main-content">

		<div class="d-flex justify-content-between align-items-center mb-4">
			<div>
				<h4 class="mb-0">🔥 User Engagement Heatmap</h4><small class="text-muted">Kab aur kitna engagement hota
					hai</small>
			</div>
			<div class="d-flex gap-2">
				<button class="btn btn-sm btn-outline-secondary" onclick="loadHeatmap(7)">7 Days</button>
				<button class="btn btn-sm btn-primary" id="btn30" onclick="loadHeatmap(30)">30 Days</button>
				<button class="btn btn-sm btn-outline-secondary" onclick="loadHeatmap(90)">90 Days</button>
			</div>
		</div>
		<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

		<!-- Peak info -->
		<div class="row g-3 mb-4">
			<div class="col-md-3">
				<div class="card shadow-sm p-3 text-center">
					<h4 id="statTotal" class="text-primary mb-0">—</h4><small class="text-muted">Total
						Engagements</small>
				</div>
			</div>
			<div class="col-md-3">
				<div class="card shadow-sm p-3 text-center">
					<h4 id="statPeak" class="text-warning mb-0">—</h4><small class="text-muted">Peak Hour</small>
				</div>
			</div>
			<div class="col-md-3">
				<div class="card shadow-sm p-3 text-center">
					<h4 id="statAvg" class="text-success mb-0">—</h4><small class="text-muted">Avg Per Day</small>
				</div>
			</div>
			<div class="col-md-3">
				<div class="card shadow-sm p-3 text-center">
					<h4 id="statDays" class="text-info mb-0">—</h4><small class="text-muted">Days Analyzed</small>
				</div>
			</div>
		</div>

		<!-- 24h Distribution Heatmap -->
		<div class="card shadow-sm p-4 mb-4">
			<h6 class="mb-3">⏰ 24-Hour Activity Distribution</h6>
			<div id="hourlyHeatmap" style="display:flex;gap:4px;align-items:flex-end;height:80px"></div>
			<div id="hourLabels" style="display:flex;gap:4px;margin-top:4px;font-size:0.6rem;color:#888"></div>
		</div>

		<!-- Daily trend chart -->
		<div class="card shadow-sm p-4 mb-4">
			<h6 class="mb-3">📅 Daily Engagement Trend</h6>
			<canvas id="trendChart" height="80"></canvas>
		</div>

		<!-- Activity grid -->
		<div class="card shadow-sm p-4">
			<h6 class="mb-3">📊 Activity Intensity Grid (GitHub-style)</h6>
			<div id="activityGrid"></div>
			<div class="d-flex align-items-center gap-2 mt-2">
				<small class="text-muted">Less</small>
				<div style="width:12px;height:12px;background:#ebedf0;border-radius:2px"></div>
				<div style="width:12px;height:12px;background:#9be9a8;border-radius:2px"></div>
				<div style="width:12px;height:12px;background:#40c463;border-radius:2px"></div>
				<div style="width:12px;height:12px;background:#30a14e;border-radius:2px"></div>
				<div style="width:12px;height:12px;background:#216e39;border-radius:2px"></div>
				<small class="text-muted">More</small>
			</div>
		</div>
	</div>
	<script th:inline="javascript">
		const CSRF_TOKEN = /*[[${_csrf.token}]]*/ '';
		const CSRF_HEADER = /*[[${_csrf.headerName}]]*/ 'X-CSRF-TOKEN';
	</script>
	<script th:src="@{/js/admin-heatmap.js}"></script>

	<button id="darkModeToggle" onclick="toggleDark()" title="Toggle Dark Mode">🌙</button>
	<script>
		function toggleDark() {
			document.body.classList.toggle('dark-mode');
			const isDark = document.body.classList.contains('dark-mode');
			localStorage.setItem('adminDarkMode', isDark);
			document.getElementById('darkModeToggle').textContent = isDark ? '☀️' : '🌙';
		}
		if (localStorage.getItem('adminDarkMode') === 'true') {
			document.body.classList.add('dark-mode');
			const btn = document.getElementById('darkModeToggle');
			if (btn) btn.textContent = '☀️';
		}
	</script>
</body>

</html>
