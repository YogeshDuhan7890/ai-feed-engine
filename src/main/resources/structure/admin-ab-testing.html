<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>A/B Testing Manager — AI Feed Admin</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
	<link rel="stylesheet" th:href="@{/css/pages/admin.css}">
	<meta name="_csrf" th:content="${_csrf.token}" />
	<meta name="_csrf_header" th:content="${_csrf.headerName}" />
</head>

<body>
	<div th:replace="~{components/admin-sidebar :: adminSidebar(activePage='ab-testing')}"></div>
	<div class="main-content">
		<div class="d-flex justify-content-between align-items-center mb-4">
			<div>
				<h4 class="mb-0">🧪 A/B Testing Manager</h4>
			</div>
			<button class="btn btn-primary btn-sm" onclick="showCreateModal()">+ New Test</button>
		</div>
		<div id="testsContainer" class="row g-4">
			<div class="text-center text-muted py-4">Loading...</div>
		</div>
		<div class="modal fade" id="createModal" tabindex="-1">
			<div class="modal-dialog modal-dialog-centered">
				<div class="modal-content p-4">
					<h6 class="mb-3">🧪 New A/B Test</h6>
					<div class="mb-2"><label class="form-label small fw-semibold">Test ID</label><input type="text"
							id="testId" class="form-control" placeholder="feed_algo_v2"></div>
					<div class="mb-2"><label class="form-label small fw-semibold">Name</label><input type="text"
							id="testName" class="form-control"></div>
					<div class="mb-2"><label class="form-label small fw-semibold">Variant A (Control)</label><input
							type="text" id="variantA" class="form-control"></div>
					<div class="mb-2"><label class="form-label small fw-semibold">Variant B (New)</label><input
							type="text" id="variantB" class="form-control"></div>
					<div class="mb-3"><label class="form-label small fw-semibold">Split % A:B</label><input
							type="number" id="split" class="form-control" value="50"></div>
					<div class="d-flex gap-2 justify-content-end"><button class="btn btn-primary"
							onclick="createTest()">Create</button><button class="btn btn-secondary"
							onclick="hideModal()">Cancel</button></div>
				</div>
			</div>
		</div>
	</div>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
	<script th:inline="javascript">
		const CSRF_TOKEN = /*[[${_csrf.token}]]*/ '';
		const CSRF_HEADER = /*[[${_csrf.headerName}]]*/ 'X-CSRF-TOKEN';
	</script>
	<script src="/js/bootstrap.bundle.min.js"></script>
	<script th:src="@{/js/admin-ab-testing.js}"></script>
	<button id="darkModeToggle" onclick="toggleDark()" title="Toggle Dark Mode">🌙</button>
	<script>
		function toggleDark() {document.body.classList.toggle('dark-mode'); const d = document.body.classList.contains('dark-mode'); localStorage.setItem('adminDarkMode', d); document.getElementById('darkModeToggle').textContent = d ? '☀️' : '🌙';}
		if (localStorage.getItem('adminDarkMode') === 'true') {document.body.classList.add('dark-mode'); const b = document.getElementById('darkModeToggle'); if (b) b.textContent = '☀️';}
	</script>
</body>

</html>
