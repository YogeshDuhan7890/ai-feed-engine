<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>AI Feed Offline</title>
	<meta name="theme-color" content="#111827">
	<style>
		:root {
			color-scheme: dark;
			--bg: #070b17;
			--panel: rgba(16, 24, 40, 0.88);
			--line: rgba(148, 163, 184, 0.18);
			--text: #f8fafc;
			--muted: #94a3b8;
			--accent: #38bdf8;
			--accent-2: #2563eb;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			font-family: "Segoe UI", Arial, sans-serif;
			color: var(--text);
			background:
				radial-gradient(circle at top, rgba(56, 189, 248, 0.2), transparent 34%),
				radial-gradient(circle at bottom right, rgba(37, 99, 235, 0.16), transparent 28%),
				linear-gradient(180deg, #050816 0%, #0f172a 100%);
			display: grid;
			place-items: center;
			padding: 24px;
		}

		.card {
			width: min(440px, 100%);
			padding: 28px;
			border-radius: 28px;
			background: var(--panel);
			border: 1px solid var(--line);
			box-shadow: 0 24px 80px rgba(2, 6, 23, 0.55);
			text-align: center;
			backdrop-filter: blur(18px);
		}

		.logo {
			width: 84px;
			height: 84px;
			border-radius: 24px;
			margin: 0 auto 18px;
			padding: 14px;
			background: linear-gradient(135deg, rgba(56, 189, 248, 0.18), rgba(37, 99, 235, 0.32));
			border: 1px solid rgba(125, 211, 252, 0.28);
		}

		.logo img {
			width: 100%;
			height: 100%;
			object-fit: contain;
		}

		h1 {
			margin: 0;
			font-size: clamp(1.8rem, 4vw, 2.4rem);
		}

		p {
			margin: 14px 0 0;
			line-height: 1.6;
			color: var(--muted);
		}

		.actions {
			display: flex;
			gap: 12px;
			justify-content: center;
			flex-wrap: wrap;
			margin-top: 24px;
		}

		button,
		a {
			appearance: none;
			border: 0;
			text-decoration: none;
			cursor: pointer;
			border-radius: 999px;
			padding: 12px 18px;
			font-weight: 700;
			font-size: 0.95rem;
			transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
		}

		button {
			background: linear-gradient(135deg, var(--accent), var(--accent-2));
			color: #eff6ff;
			box-shadow: 0 12px 30px rgba(37, 99, 235, 0.35);
		}

		a {
			background: rgba(15, 23, 42, 0.72);
			color: var(--text);
			border: 1px solid var(--line);
		}

		button:hover,
		a:hover {
			transform: translateY(-1px);
		}

		.hint {
			margin-top: 20px;
			font-size: 0.88rem;
			color: #7dd3fc;
		}
	</style>
</head>
<body>
	<main class="card">
		<div class="logo">
			<img src="/images/icon-192.png" alt="AI Feed icon">
		</div>
		<h1>You're offline</h1>
		<p>Internet connection abhi available nahi hai. AI Feed reconnect hote hi aap normal feed par wapas aa jaoge.</p>
		<div class="actions">
			<button type="button" onclick="location.reload()">Try Again</button>
			<a href="/feed">Open Feed</a>
		</div>
		<div class="hint">Tip: app ko home screen se kholne par offline fallback aur smooth chalega.</div>
	</main>
</body>
</html>
