spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: aifeed-consumer
      auto-offset-reset: latest

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  thymeleaf:
    cache: true

server:
  servlet:
    session:
      timeout: 30m
      cookie:
        secure: true
        http-only: true
        same-site: strict
  compression:
    enabled: true
    mime-types: text/html,text/css,application/javascript,application/json
    min-response-size: 1024
  tomcat:
    remoteip:
      remote-ip-header: X-Forwarded-For
      protocol-header: X-Forwarded-Proto

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

upload:
  path: ${UPLOAD_PATH:/app/uploads/}

push:
  vapid:
    public-key: ${PUSH_VAPID_PUBLIC_KEY:}
    private-key: ${PUSH_VAPID_PRIVATE_KEY:}
    subject: ${PUSH_VAPID_SUBJECT:mailto:yogeshduhan7890@gmail.com}

mail:
  zoho:
    host: ${MAIL_ZOHO_HOST:smtp.zoho.in}
    port: ${MAIL_ZOHO_PORT:587}
    username: ${MAIL_ZOHO_USERNAME:}
    password: ${MAIL_ZOHO_PASSWORD:}
  gmail:
    host: ${MAIL_GMAIL_HOST:smtp.gmail.com}
    port: ${MAIL_GMAIL_PORT:587}
    username: ${MAIL_GMAIL_USERNAME:}
    password: ${MAIL_GMAIL_PASSWORD:}

app:
  base-url: ${APP_BASE_URL}
  security:
    allowed-origins: ${APP_ALLOWED_ORIGINS:https://your-domain.example}

razorpay:
  key-id: ${RAZORPAY_KEY_ID:}
  key-secret: ${RAZORPAY_KEY_SECRET:}
  account-id: ${RAZORPAY_ACCOUNT_ID:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.yogesh: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
